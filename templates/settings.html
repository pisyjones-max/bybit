{% extends "base.html" %}
{% block title %}Настройки{% endblock %}
{% block content %}
<h1>⚙ Настройки</h1>

<p style="font-size:13px;color:#6b7280;margin-top:-10px;">
    {% if has_keys %}✅ API-ключи Bybit сохранены{% else %}⚠️ API-ключи ещё не заданы{% endif %}
</p>

<form method="post">
    <input type="hidden" name="action" value="update_keys">
    <label>Bybit API Key</label>
    <input type="text" name="api_key" placeholder="оставь пустым, чтобы не менять" autocomplete="off">
    <label>Bybit API Secret</label>
    <input type="password" name="api_secret" placeholder="оставь пустым, чтобы не менять" autocomplete="off">
    <button type="submit">Сохранить ключи</button>
</form>

<hr style="border-color:#1e2936;margin:20px 0;">

<form method="post">
    <input type="hidden" name="action" value="update_config">

    <div class="checkbox-row">
        <input type="checkbox" name="is_active" id="is_active" {% if cfg.is_active %}checked{% endif %}>
        <label for="is_active" style="margin:0;">Бот активен (торгует моими ключами)</label>
    </div>

    <label>Размер позиции (USDT)</label>
    <input type="number" step="0.5" name="buy_usdt" value="{{ cfg.buy_usdt }}">

    <label>RSI вход (порог)</label>
    <input type="number" name="rsi_entry" value="{{ cfg.rsi_entry }}">

    <label>Take Profit (%)</label>
    <input type="number" step="0.5" name="take_profit_pct" value="{{ cfg.take_profit_pct }}">

    <label>Stop Loss (%)</label>
    <input type="number" step="0.5" name="stop_loss_pct" value="{{ cfg.stop_loss_pct }}">

    <label>Макс. открытых позиций</label>
    <input type="number" name="max_open_positions" value="{{ cfg.max_open_positions }}">

    <button type="submit">Сохранить настройки</button>
</form>

<p><a href="/dashboard/">← К дашборду</a></p>
{% endblock %}
